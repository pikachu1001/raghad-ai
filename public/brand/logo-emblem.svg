<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none" role="img" aria-label="Raghad AI">
  <defs>
    <linearGradient id="petalLeft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c026d3"/>
      <stop offset="50%" stop-color="#9333ea"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="petalRight" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8d5a8"/>
      <stop offset="40%" stop-color="#c9a962"/>
      <stop offset="100%" stop-color="#9a7b3c"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Gold swoosh -->
  <path
    d="M128 38 C148 28, 168 42, 162 68 C156 94, 138 108, 122 118 C108 126, 96 132, 88 140"
    stroke="url(#gold)"
    stroke-width="5"
    stroke-linecap="round"
    fill="none"
    filter="url(#softGlow)"
  />
  <path
    d="M132 44 C146 38, 158 48, 154 66 C150 82, 136 94, 124 102"
    stroke="#f5eedf"
    stroke-width="1.5"
    stroke-linecap="round"
    fill="none"
    opacity="0.6"
  />

  <!-- Center gem -->
  <polygon
    points="100,88 108,100 100,112 92,100"
    fill="url(#gold)"
    stroke="#9a7b3c"
    stroke-width="0.5"
  />

  <!-- Petals  left cluster (magenta/purple) -->
  <path d="M100 52 L108 78 L100 88 L92 78 Z" fill="url(#petalLeft)" stroke="#9a7b3c" stroke-width="0.4"/>
  <path d="M72 68 L96 82 L100 88 L80 96 Z" fill="url(#petalLeft)" stroke="#9a7b3c" stroke-width="0.4"/>
  <path d="M68 100 L88 96 L100 88 L88 80 Z" fill="url(#petalLeft)" stroke="#9a7b3c" stroke-width="0.4"/>
  <path d="M72 132 L80 96 L100 88 L96 118 Z" fill="url(#petalLeft)" stroke="#9a7b3c" stroke-width="0.4"/>

  <!-- Petals  right cluster (cyan/blue) -->
  <path d="M100 52 L112 78 L100 88 L88 78 Z" fill="url(#petalRight)" stroke="#9a7b3c" stroke-width="0.4"/>
  <path d="M128 68 L104 82 L100 88 L120 96 Z" fill="url(#petalRight)" stroke="#9a7b3c" stroke-width="0.4"/>
  <path d="M132 100 L112 96 L100 88 L112 80 Z" fill="url(#petalRight)" stroke="#9a7b3c" stroke-width="0.4"/>
  <path d="M128 132 L120 96 L100 88 L104 118 Z" fill="url(#petalRight)" stroke="#9a7b3c" stroke-width="0.4"/>

  <!-- Bottom petals -->
  <path d="M100 128 L108 112 L100 88 L92 112 Z" fill="url(#petalLeft)" stroke="#9a7b3c" stroke-width="0.4"/>
  <path d="M100 128 L112 112 L100 88 L88 112 Z" fill="url(#petalRight)" stroke="#9a7b3c" stroke-width="0.4"/>
</svg>
